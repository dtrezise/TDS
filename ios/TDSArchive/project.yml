name: TDSArchive
options:
  bundleIdPrefix: org.tdsevidence
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: "TDS Evidence"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.news"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTS_MACCATALYST: NO
targets:
  TDSArchive:
    type: application
    platform: iOS
    sources:
      - path: TDSArchive
        excludes:
          - Resources
      - path: TDSArchive/Resources
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.tdsevidence.archive
        PRODUCT_MODULE_NAME: TDSArchive
    scheme:
      testTargets:
        - TDSArchiveTests
  TDSArchiveTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: TDSArchiveTests
    dependencies:
      - target: TDSArchive
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.tdsevidence.archive.tests
